<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>gsx playground — fully client-side (WASM)</title>
<script src="wasm_exec.js"></script>
<style>
  body { font: 14px/1.5 system-ui, sans-serif; margin: 1.5rem; max-width: 1200px; }
  h1 { font-size: 1.2rem; }
  #status { padding: .4rem .7rem; border-radius: 6px; background: #eee; display: inline-block; }
  #status.ready { background: #d8f5d8; }
  #status.err { background: #f8d8d8; }
  label { display:block; font-weight:600; margin:.7rem 0 .25rem; font-size:.9rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: .5rem; }
  textarea, input, pre { font: 13px/1.45 ui-monospace, Menlo, monospace; width: 100%; box-sizing: border-box; }
  textarea { height: 190px; padding: .6rem; }
  input { padding: .45rem .6rem; }
  pre { background: #1e1e2e; color: #cdd6f4; padding: .8rem; border-radius: 6px; overflow: auto; white-space: pre-wrap; margin:0; }
  pre.tall { min-height: 190px; }
  #preview { background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: .8rem; min-height: 70px; }
  #diags { background:#2a1e1e; color:#f5c6c6; }
  #diags:empty::before { content:"(none)"; color:#888; }
  h3 { margin: .8rem 0 .3rem; font-size:.95rem; }
</style>
</head>
<body>
  <h1>gsx playground — transform <em>and</em> render, entirely in your browser (WASM)</h1>
  <p><span id="status">loading WASM…</span></p>

  <div class="grid">
    <div>
      <label for="src">gsx source</label>
      <textarea id="src" spellcheck="false">package main

component Greeting(name string) {
	<p>Hello { name |> upper }!</p>
}
</textarea>
      <label for="invoke">render expression (invoke)</label>
      <input id="invoke" spellcheck="false" value='Greeting(GreetingProps{Name: "World"})' />
      <h3>Diagnostics</h3>
      <pre id="diags"></pre>
    </div>
    <div>
      <h3>Rendered HTML (interpreted client-side)</h3>
      <div id="preview"></div>
      <h3>Raw HTML</h3>
      <pre id="rawhtml"></pre>
      <h3>Generated Go</h3>
      <pre id="code" class="tall"></pre>
    </div>
  </div>

<script>
const go = new Go();
const $ = (id) => document.getElementById(id);

function run() {
  if (typeof globalThis.gsxTransform !== "function") return;
  const out = globalThis.gsxTransform($("src").value, $("invoke").value);
  $("code").textContent = out.generatedGo || "(no output)";
  $("rawhtml").textContent = out.html || "";
  $("preview").innerHTML = out.html || "<em style='color:#888'>(no render)</em>";
  $("diags").textContent = (out.diagnostics || [])
    .map((d) => `${d.severity} ${d.line}:${d.column} ${d.message}`)
    .join("\n");
}

globalThis.gsxReady = () => {
  const s = $("status");
  s.textContent = "WASM ready ✓ — transform + render run locally, zero network";
  s.className = "ready";
  $("src").addEventListener("input", run);
  $("invoke").addEventListener("input", run);
  run();
};

(async () => {
  try {
    const bytes = await (await fetch("gsx.wasm")).arrayBuffer();
    const res = await WebAssembly.instantiate(bytes, go.importObject);
    go.run(res.instance);
  } catch (e) {
    const s = $("status");
    s.textContent = "WASM load failed: " + e;
    s.className = "err";
  }
})();
</script>
</body>
</html>
