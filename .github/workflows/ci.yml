name: CI

# Comprehensive checks for the gsx repo. Runs on every push to main and on PRs.
#
# Each job invokes a Makefile target so the commands stay defined in ONE place
# (the Makefile, which developers run locally as `make ci`); this workflow only
# provides the runner, Go/Node toolchain, and job-level parallelism. Keep CI and
# the Makefile in sync by editing the targets, not by duplicating commands here.
# Jobs:
#   build-test  — `make ci-gomod` + `make ci-playground` (both Go modules)
#   examples    — `make ci-examples` (regenerate artifacts, fail on drift)
#   docs        — build the VitePress site against this checkout (catches gsx docs/guide
#                 markdown that breaks the site — e.g. raw {{ }} / <tags> in prose)
#   format      — `make ci-format` (gofmt + gsx fmt)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: '1.26.1'

jobs:
  build-test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gsx module (build · vet · test)
        run: make ci-gomod
      - name: playground/server module (build · test)
        run: make ci-playground
      - name: examples/tailwind-merge module (build · test)
        run: make ci-tailwind-example

  examples:
    name: examples render + drift
    runs-on: ubuntu-latest
    # Render-checking every example (TestExamples) is covered by `make ci-gomod`'s
    # `go test ./...` in the build-test job; this job guards the generated artifacts.
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Generated artifacts match the fixtures (no uncommitted drift)
        run: make ci-examples
      - name: tailwind-merge card.x.go matches committed output (no drift)
        run: make ci-tailwind-example-drift

  docs:
    name: docs build (VitePress)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gsx (docs source)
        uses: actions/checkout@v5
      - name: Checkout docs site
        uses: actions/checkout@v5
        with:
          repository: gsxhq/gsxhq.github.io
          path: site
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Build site against this gsx checkout
        working-directory: site
        env:
          # Sync docs/guide/** + examples.json from THIS checkout, not a clone of main,
          # so a docs change is validated before it can break the live site.
          GSX_DOCS_SRC: ${{ github.workspace }}
          VITE_GSX_PLAYGROUND_API: https://example.invalid
        run: npm run build

  format:
    name: format
    runs-on: ubuntu-latest
    # Required gate: a one-time `gofmt -w` / `gsx fmt -w` cleanup landed (chore/format-gate),
    # so gofmt + gsx fmt must stay clean. Pin GO_VERSION to the same gofmt the cleanup
    # used — a different Go minor can re-introduce formatting drift.
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt + gsx fmt
        run: make ci-format

  go-tip:
    name: go tip (generic-method tests)
    runs-on: ubuntu-latest
    continue-on-error: true
    # Non-blocking tip lane: runs the go1.27-gated generic-method tests under
    # gotip with skip promoted to failure. continue-on-error keeps tip breakage
    # from blocking merges; the lane exists so the generic-method path is
    # actually executed somewhere before GO_VERSION reaches 1.27.
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cache gotip SDK
        uses: actions/cache@v4
        with:
          path: ~/sdk/gotip
          key: gotip-${{ runner.os }}-${{ github.run_number }}
          restore-keys: gotip-${{ runner.os }}-
      - name: Install gotip
        run: |
          go install golang.org/dl/gotip@latest
          gotip download
      - name: Run generic-method tests under tip
        run: make test-gotip
