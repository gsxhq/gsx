name: CI

# Comprehensive checks for the gsx repo. Runs on every push to main and on PRs.
# Jobs:
#   build-test  — compile + vet + test BOTH Go modules (root gsx + playground/server)
#   examples    — render-check every example AND guard against stale generated artifacts
#   docs        — build the VitePress site against this checkout (catches gsx docs/guide
#                 markdown that breaks the site — e.g. raw {{ }} / <tags> in prose)
#   format      — gofmt + gsx fmt (advisory; see note on the job)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: '1.26.1'

jobs:
  build-test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build (gsx module)
        run: go build ./...
      - name: Vet (gsx module)
        run: go vet ./...
      - name: Test (gsx module)
        run: go test ./... -count=1
      - name: Build + test (playground/server module)
        working-directory: playground/server
        run: |
          go build ./...
          go test ./... -count=1

  examples:
    name: examples render + drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Render-check every example (compile + go run + golden)
        run: go test ./internal/corpus/ -run TestExamples -count=1
      - name: Generated artifacts match the fixtures (no uncommitted drift)
        run: |
          make examples
          if ! git diff --exit-code -- docs/guide/examples.md docs/examples.json playground/server/examples.json; then
            echo "::error::examples artifacts are stale — run 'make examples' and commit the result"
            exit 1
          fi

  docs:
    name: docs build (VitePress)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gsx (docs source)
        uses: actions/checkout@v5
      - name: Checkout docs site
        uses: actions/checkout@v5
        with:
          repository: gsxhq/gsxhq.github.io
          path: site
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Build site against this gsx checkout
        working-directory: site
        env:
          # Sync docs/guide/** + examples.json from THIS checkout, not a clone of main,
          # so a docs change is validated before it can break the live site.
          GSX_DOCS_SRC: ${{ github.workspace }}
          VITE_GSX_PLAYGROUND_API: https://example.invalid
        run: npm run build

  format:
    name: format (advisory)
    runs-on: ubuntu-latest
    # Advisory for now: the repo carries pre-1.26 gofmt drift (Go 1.26's gofmt
    # changed struct-comment alignment) and a couple of unformatted .gsx templates.
    # Flip `continue-on-error` to false once a one-time `gofmt -w` / `gsx fmt -w`
    # cleanup lands, to make formatting a required gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt
        run: |
          files=$(gofmt -l $(git ls-files '*.go' | grep -v /testdata/))
          if [ -n "$files" ]; then
            echo "::warning::these Go files need gofmt:"; echo "$files"; exit 1
          fi
      - name: gsx fmt
        run: |
          if ! go run ./cmd/gsx fmt -l .; then
            echo "::warning::the listed .gsx files need 'gsx fmt -w'"; exit 1
          fi
