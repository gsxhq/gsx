name: Deploy playground server

on:
  push:
    branches: [main]
    # The image bakes the whole repo (Dockerfile does `COPY . /gsx`) because the
    # playground compiles visitor code against the live gsx module. So a parser or
    # codegen change does need a redeploy — only paths that cannot reach the
    # running compiler belong here.
    paths-ignore:
      - 'docs/**'
      - 'skills/**'
      - '**.md'
      - 'LICENSE'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: playground-server-deploy
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.1'
  ALLOWED_ORIGIN: https://gsxhq.github.io
  ARTIFACT_REPOSITORY: gsx

jobs:
  deploy:
    name: build, deploy, smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify playground server
        run: make ci-playground

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ vars.CLOUD_RUN_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          IMAGE: ${{ vars.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}
        run: |
          docker build \
            -f playground/server/Dockerfile \
            -t "$IMAGE" \
            .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ vars.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}
          RUNTIME_SERVICE_ACCOUNT: gsx-playground-sandbox@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.CLOUD_RUN_REGION }}" \
            --image "$IMAGE" \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --concurrency 4 \
            --timeout 30 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "ALLOWED_ORIGIN=$ALLOWED_ORIGIN"

      - name: Smoke test deployed renderer
        env:
          SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          PROJECT: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.CLOUD_RUN_REGION }}
        run: |
          url="$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT" \
            --region "$REGION" \
            --format 'value(status.url)')"

          cat > /tmp/spread-attrs.json <<'JSON'
          {
            "gsx": "package views\n\nimport \"github.com/gsxhq/gsx\"\n\ncomponent Card(extra gsx.Attrs) {\n\t<div { extra... }>content</div>\n}\n",
            "invoke": "Card(CardProps{Extra: gsx.Attrs{{Key: \"id\", Value: \"box\"}, {Key: \"data-active\", Value: \"true\"}}})"
          }
          JSON

          python3 - "$url" <<'PY'
          import json
          import sys
          import urllib.request

          url = sys.argv[1].rstrip("/") + "/render"
          with open("/tmp/spread-attrs.json", "rb") as f:
              body = f.read()
          req = urllib.request.Request(
              url,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read().decode("utf-8"))
          expected = '<div id="box" data-active="true">content</div>'
          if data.get("error") or data.get("html") != expected:
              print(json.dumps(data, indent=2), file=sys.stderr)
              raise SystemExit("spread-attrs smoke test failed")
          print(f"smoke ok: {data['html']}")
          PY
