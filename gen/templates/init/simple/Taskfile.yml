version: '3'

dotenv: ['.env']

# Prefix each parallel task's lines ([dev:vite] / [dev:server]) into one
# readable combined log.
output: prefixed

tasks:
  dev:
    desc: Run Vite + the Go server with live reload.
    deps: [dev:vite, dev:server]

  dev:vite:
    desc: Vite dev server (front door; runs the gsx plugin).
    cmds:
      - npm run dev

  dev:server:
    desc: Rebuild + restart the Go server on .go changes.
    cmds:
      # Single-quoted: the wgo `::` separator contains a colon-space sequence that
      # unquoted YAML would misparse as a mapping key.
      - 'go tool wgo -file=.go -xdir=tmp -xdir=node_modules -xdir=dist go build -o tmp/app . :: tmp/app'
