version: '3'

dotenv: ['.env']

# Prefix each parallel task's lines ([dev:vite] / [dev:server]) into one readable
# combined terminal log, and tee the same stream to tmp/dev.log for the
# dev-fallback page to display while the Go server restarts.
output: prefixed

tasks:
  dev:
    desc: Run Vite + the Go server with live reload.
    deps: [dev:vite, dev:server]

  dev:setup:
    internal: true
    cmds:
      - mkdir -p tmp
      # Build wgo to a real binary. `go tool wgo` adds a wrapper process that
      # races Ctrl-C and orphans the Go server (it survives, holding GO_PORT).
      - go build -o tmp/wgo github.com/bokwoon95/wgo
      - 'echo "=== task dev ===" > tmp/dev.log'
      - go tool gsx generate .

  dev:vite:
    desc: Vite dev server (front door; runs the gsx plugin).
    deps: [dev:setup]
    cmds:
      - 'npm run dev 2>&1 | tee -a tmp/dev.log'

  dev:server:
    desc: Rebuild + restart the Go server on .go changes.
    deps: [dev:setup]
    cmds:
      # tmp/wgo (built in dev:setup), not `go tool wgo` — see there.
      # Single-quoted: the `::` + pipe contain `: ` which unquoted YAML misparses.
      - 'tmp/wgo -file=.go -xdir=tmp -xdir=node_modules -xdir=dist go build -o tmp/app . :: tmp/app 2>&1 | tee -a tmp/dev.log'
