version: '3'

dotenv: ['.env']

# Prefix each parallel task's lines ([dev:vite] / [dev:server]) into one
# readable combined terminal log.
output: prefixed

tasks:
  dev:
    desc: Run Vite + the Go server with live reload.
    deps: [dev:vite, dev:server]

  dev:setup:
    internal: true
    cmds:
      - mkdir -p tmp
      # Real binary, not `go tool wgo`: the wrapper races Ctrl-C and orphans the server.
      - go build -o tmp/wgo github.com/bokwoon95/wgo
      - go tool gsx generate .

  dev:vite:
    desc: Vite dev server (front door; runs the gsx plugin).
    deps: [dev:setup]
    cmds:
      - npm run dev

  dev:server:
    desc: Rebuild + restart the Go server on .go changes.
    deps: [dev:setup]
    cmds:
      # Single-quoted (`::` contains `: `). Tee server output to tmp/dev.log
      # (truncating, so it's fresh each session) — the dev-fallback interstitial
      # tails it to show why the server is down (build error / crash).
      - 'tmp/wgo -file=.go -xdir=tmp -xdir=node_modules -xdir=dist go build -o tmp/app . :: tmp/app 2>&1 | tee tmp/dev.log'
